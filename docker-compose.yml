version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-your_secret_key}
      - DATABASE_PATH=/app/db/rbac.db
    volumes:
      - ./backend/db:/app/db
    networks:
      - rbac-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    networks:
      - rbac-network
    depends_on:
      - backend

networks:
  rbac-network:
    driver: bridge
